<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>音訊開頭加靜音並匯出 OGG</title>
<style>
  :root { color-scheme: light dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif; }
  body { max-width: 720px; margin: 0 auto; padding: 24px; line-height: 1.6; }
  .card { border: 1px solid #8884; border-radius: 18px; padding: 18px; box-shadow: 0 8px 28px #0001; }
  label { display:block; margin: 14px 0 6px; font-weight: 700; }
  input, select, button { font: inherit; width: 100%; box-sizing: border-box; padding: 12px; border-radius: 12px; border: 1px solid #8886; }
  button { margin-top: 16px; cursor:pointer; font-weight: 800; }
  button:disabled { opacity:.6; cursor:not-allowed; }
  #log { white-space: pre-wrap; background: #8881; border-radius: 12px; padding: 12px; min-height: 84px; margin-top: 16px; font-size: 14px; }
  #download { display:none; margin-top: 16px; padding: 12px; border-radius: 12px; text-align:center; border: 1px solid #8886; text-decoration:none; font-weight:800; }
  small { opacity:.75; }
</style>
</head>
<body>
  <h1>音訊前方加靜音 → OGG</h1>
  <div class="card">
    <label>選擇音訊檔</label>
    <input id="file" type="file" accept="audio/*">

    <label>開頭靜音秒數</label>
    <input id="seconds" type="number" value="3" min="0" step="0.1">

    <label>輸出品質</label>
    <select id="bitrate">
      <option value="64k">64k 小檔案</option>
      <option value="96k" selected>96k 一般推薦</option>
      <option value="128k">128k 品質較好</option>
      <option value="192k">192k 品質更好</option>
    </select>

    <button id="start">開始轉換</button>
    <a id="download">下載 OGG</a>
    <div id="log">準備好了。這版不用 SharedArrayBuffer，也不會載入 CDN 的 worker.js。</div>
    <small>第一次載入會下載約 30MB 的 FFmpeg wasm。手機上請避免太大的音訊檔。</small>
  </div>

<script>
const $ = s => document.querySelector(s);
const logBox = $('#log');
const startBtn = $('#start');
const downloadLink = $('#download');
let worker;
let msgId = 0;
const pending = new Map();

function log(text) {
  logBox.textContent = text;
}

async function toBlobURL(url, mimeType) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`下載失敗：${url}`);
  const blob = await res.blob();
  return URL.createObjectURL(new Blob([blob], { type: mimeType }));
}

function makeWorker() {
  const workerCode = `
    let ffmpeg;
    const FFMessageType = {
      LOAD:'LOAD', EXEC:'EXEC', WRITE_FILE:'WRITE_FILE', READ_FILE:'READ_FILE', ERROR:'ERROR', LOG:'LOG', PROGRESS:'PROGRESS'
    };
    const ERROR_NOT_LOADED = new Error('ffmpeg is not loaded');
    const ERROR_IMPORT_FAILURE = new Error('failed to import ffmpeg-core.js');

    async function load({ coreURL, wasmURL, workerURL }) {
      const first = !ffmpeg;
      try {
        importScripts(coreURL);
      } catch (e) {
        self.createFFmpegCore = (await import(coreURL)).default;
        if (!self.createFFmpegCore) throw ERROR_IMPORT_FAILURE;
      }
      ffmpeg = await self.createFFmpegCore({
        mainScriptUrlOrBlob: coreURL + '#' + btoa(JSON.stringify({ wasmURL, workerURL }))
      });
      ffmpeg.setLogger(data => self.postMessage({ type: FFMessageType.LOG, data }));
      ffmpeg.setProgress(data => self.postMessage({ type: FFMessageType.PROGRESS, data }));
      return first;
    }

    function exec({ args }) {
      ffmpeg.exec(...args);
      const ret = ffmpeg.ret;
      ffmpeg.reset();
      return ret;
    }

    self.onmessage = async ({ data: { id, type, data } }) => {
      try {
        if (type !== FFMessageType.LOAD && !ffmpeg) throw ERROR_NOT_LOADED;
        let result;
        if (type === FFMessageType.LOAD) result = await load(data);
        else if (type === FFMessageType.WRITE_FILE) { ffmpeg.FS.writeFile(data.path, data.data); result = true; }
        else if (type === FFMessageType.EXEC) result = exec(data);
        else if (type === FFMessageType.READ_FILE) result = ffmpeg.FS.readFile(data.path);
        else throw new Error('unknown message type: ' + type);
        const transfer = result instanceof Uint8Array ? [result.buffer] : [];
        self.postMessage({ id, type, data: result }, transfer);
      } catch (e) {
        self.postMessage({ id, type: FFMessageType.ERROR, data: e && e.stack ? e.stack : String(e) });
      }
    };
  `;
  return new Worker(URL.createObjectURL(new Blob([workerCode], { type: 'text/javascript' })));
}

function callWorker(type, data) {
  return new Promise((resolve, reject) => {
    const id = ++msgId;
    pending.set(id, { resolve, reject });
    worker.postMessage({ id, type, data });
  });
}

async function ensureWorkerLoaded() {
  if (worker) return;
  log('正在載入 FFmpeg，小工廠暖機中…');
  worker = makeWorker();
  worker.onmessage = ({ data }) => {
    if (data.type === 'LOG') {
      if (data.data && data.data.message) log(data.data.message);
      return;
    }
    if (data.type === 'PROGRESS') return;
    const item = pending.get(data.id);
    if (!item) return;
    pending.delete(data.id);
    if (data.type === 'ERROR') item.reject(new Error(data.data));
    else item.resolve(data.data);
  };

  const base = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/umd';
  const coreURL = await toBlobURL(base + '/ffmpeg-core.js', 'text/javascript');
  const wasmURL = await toBlobURL(base + '/ffmpeg-core.wasm', 'application/wasm');
  await callWorker('LOAD', { coreURL, wasmURL });
  log('FFmpeg 載入完成，可以開始轉檔。');
}

function safeExt(name) {
  const m = name.match(/\.([a-z0-9]{1,8})$/i);
  return m ? m[1].toLowerCase() : 'input';
}

$('#start').onclick = async () => {
  try {
    const file = $('#file').files[0];
    if (!file) { alert('先選一個音訊檔啦 🎧'); return; }

    startBtn.disabled = true;
    downloadLink.style.display = 'none';
    downloadLink.removeAttribute('href');

    await ensureWorkerLoaded();

    const seconds = Math.max(0, Number($('#seconds').value || 0));
    const bitrate = $('#bitrate').value;
    const ext = safeExt(file.name);
    const inputName = 'input.' + ext;
    const outputName = 'output.ogg';

    log('正在讀取檔案…');
    const bytes = new Uint8Array(await file.arrayBuffer());
    await callWorker('WRITE_FILE', { path: inputName, data: bytes });

    log('正在加靜音並輸出 OGG，手機可能會慢一點…');
    const args = [
      '-hide_banner',
      '-f', 'lavfi',
      '-t', String(seconds),
      '-i', 'anullsrc=channel_layout=stereo:sample_rate=44100',
      '-i', inputName,
      '-filter_complex', '[0:a][1:a]concat=n=2:v=0:a=1[a]',
      '-map', '[a]',
      '-c:a', 'libopus',
      '-b:a', bitrate,
      '-vn',
      outputName
    ];
    const ret = await callWorker('EXEC', { args });
    if (ret !== 0) throw new Error('FFmpeg 轉換失敗，代碼：' + ret);

    const out = await callWorker('READ_FILE', { path: outputName });
    const blob = new Blob([out.buffer], { type: 'audio/ogg; codecs=opus' });
    const url = URL.createObjectURL(blob);
    downloadLink.href = url;
    downloadLink.download = file.name.replace(/\.[^.]+$/, '') + '_silence_' + seconds + 's.ogg';
    downloadLink.textContent = '下載 OGG';
    downloadLink.style.display = 'block';
    log('完成！OGG 已烤好，可以下載了。');
  } catch (err) {
    console.error(err);
    log('失敗：\n' + (err && err.message ? err.message : String(err)));
  } finally {
    startBtn.disabled = false;
  }
};
</script>
</body>
</html>
